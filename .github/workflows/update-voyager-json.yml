name: Update Voyager JSON

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:      # allows manual run from GitHub UI

jobs:
  update-json:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm install node-fetch@3 @octokit/rest ts-node typescript

      - name: Run TypeScript update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx ts-node .github/scripts/update-voyager-json.ts
